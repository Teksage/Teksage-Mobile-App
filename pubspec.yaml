name: astro_prompt
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 3.0.0+38

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  flutter_native_splash: ^2.4.7
  get: ^4.6.6
  http: ^1.3.0
  intl: ^0.20.2
  shared_preferences: ^2.5.2
  flutter_svg: ^2.0.17
  smooth_page_indicator: ^1.2.0+3
  flutter_animate_on_scroll: ^0.3.0
  loading_animation_widget: ^1.3.0
  webview_flutter: ^4.10.0
  percent_indicator: ^4.2.4
  month_picker_dialog: ^6.0.2
  web_socket_channel: ^3.0.3
  url_launcher: ^6.3.1
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  flutter_local_notifications: ^19.1.0
  android_intent_plus: ^6.0.0
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  screenshot: ^3.0.0
  device_info_plus: ^12.3.0
  permission_handler: ^12.0.0+1
  razorpay_flutter: ^1.4.0
  geolocator: ^14.0.0
  geocoding: ^4.0.0
  file_saver: ^0.3.1
  open_file: ^3.5.10
  flutter_timezone: ^5.0.1
  path: ^1.9.1
  connectivity_plus: ^7.0.0
  eq_indexd_stack: ^0.0.9
  internet_connection_checker_plus: ^2.7.2
  in_app_purchase: ^3.2.3
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.3
  rate_my_app: ^2.3.2
  record: ^6.1.1
  http_parser: ^4.1.2
  just_audio: ^0.10.5
  audio_session: ^0.2.2
  in_app_purchase_storekit: ^0.4.6
#  just_waveform: ^0.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/svg/

  fonts:
   
  # ---------------- ENGLISH (Urbanist) ----------------
  - family: FontRegular
    fonts:
      - asset: assets/fonts/Urbanist-Regular.ttf

  - family: FontMedium
    fonts:
      - asset: assets/fonts/Urbanist-Medium.ttf

  - family: FontSemiBold
    fonts:
      - asset: assets/fonts/Urbanist-SemiBold.ttf

  - family: FontBold
    fonts:
      - asset: assets/fonts/Urbanist-Bold.ttf

  - family: FontExtraBold
    fonts:
      - asset: assets/fonts/Urbanist-ExtraBold.ttf


  # ---------------- TAMIL ----------------
  - family: TamilRegular
    fonts:
      - asset: assets/fonts/AnekTamil-Regular.ttf

  - family: TamilMedium
    fonts:
      - asset: assets/fonts/AnekTamil-Medium.ttf

  - family: TamilSemiBold
    fonts:
      - asset: assets/fonts/AnekTamil-SemiBold.ttf

  - family: TamilBold
    fonts:
      - asset: assets/fonts/AnekTamil-Bold.ttf

  - family: TamilExtraBold
    fonts:
      - asset: assets/fonts/AnekTamil-ExtraBold.ttf


  # ---------------- TELUGU ----------------
  - family: TeluguRegular
    fonts:
      - asset: assets/fonts/AnekTelugu-Regular.ttf

  - family: TeluguMedium
    fonts:
      - asset: assets/fonts/AnekTelugu-Medium.ttf

  - family: TeluguSemiBold
    fonts:
      - asset: assets/fonts/AnekTelugu-SemiBold.ttf

  - family: TeluguBold
    fonts:
      - asset: assets/fonts/AnekTelugu-Bold.ttf

  - family: TeluguExtraBold
    fonts:
      - asset: assets/fonts/AnekTelugu-ExtraBold.ttf


  # ---------------- MALAYALAM ----------------
  - family: MalayalamRegular
    fonts:
      - asset: assets/fonts/AnekMalayalam-Regular.ttf

  - family: MalayalamMedium
    fonts:
      - asset: assets/fonts/AnekMalayalam-Medium.ttf

  - family: MalayalamSemiBold
    fonts:
      - asset: assets/fonts/AnekMalayalam-SemiBold.ttf

  - family: MalayalamBold
    fonts:
      - asset: assets/fonts/AnekMalayalam-Bold.ttf

  - family: MalayalamExtraBold
    fonts:
      - asset: assets/fonts/AnekMalayalam-ExtraBold.ttf


  # ---------------- KANNADA ----------------
  - family: KannadaRegular
    fonts:
      - asset: assets/fonts/AnekKannada-Regular.ttf

  - family: KannadaMedium
    fonts:
      - asset: assets/fonts/AnekKannada-Medium.ttf

  - family: KannadaSemiBold
    fonts:
      - asset: assets/fonts/AnekKannada-SemiBold.ttf

  - family: KannadaBold
    fonts:
      - asset: assets/fonts/AnekKannada-Bold.ttf

  - family: KannadaExtraBold
    fonts:
      - asset: assets/fonts/AnekKannada-ExtraBold.ttf

